name: Feature request
description: Suggest an enhancement or new capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation in your server today. What's awkward or impossible?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like Thread It to behave? Be concrete if you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you ruled out, and why.

  - type: checkboxes
    id: scope
    attributes:
      label: Pre-flight
      options:
        - label: I've checked existing issues; this hasn't been proposed.
          required: true
        - label: This is in scope for "automatically convert replies into threads" — it's not a request to turn Thread It into a general moderation bot.
          required: true
